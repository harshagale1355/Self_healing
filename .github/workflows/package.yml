name: "Package AI Log Analyzer"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  package:
    name: "Build on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Set up Python 3.10"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: "Install base dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller flet

      - name: "Package Application (Windows)"
        if: matrix.os == 'windows-latest'
        run: |
          flet pack ui/app_flet.py --name "AI Log Analyzer" --icon assets/icon.png --add-data "agents;agents" --add-data "rag;rag" --add-data "workflows;workflows" --add-data "utils;utils" --add-data "prompts;prompts" --add-data "config.py;." --add-data "requirements.txt;."

      - name: "Package Application (Linux/macOS)"
        if: matrix.os != 'windows-latest'
        run: |
          flet pack ui/app_flet.py --name "AI Log Analyzer" --icon assets/icon.png --add-data "agents:agents" --add-data "rag:rag" --add-data "workflows:workflows" --add-data "utils:utils" --add-data "prompts:prompts" --add-data "config.py:." --add-data "requirements.txt:."

      - name: "Upload Build Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "AI-Log-Analyzer-${{ matrix.os }}"
          path: |
            dist/*.exe
            dist/AI Log Analyzer
            dist/*.app
          if-no-files-found: warn
